version: '3.8'

services:
  my-note:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Frontend will call backend at domain:8080 (adjust to your real domain)
        REACT_APP_API_URL: "http://localhost:8080"
    image: my-note:latest
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    # optional: mount local build during development
    # volumes:
    #   - ./build:/usr/share/nginx/html:ro
