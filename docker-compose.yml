version: '3.8'

services:
  my-note:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-note:latest
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    # optional: mount local build during development
    # volumes:
    #   - ./build:/usr/share/nginx/html:ro
